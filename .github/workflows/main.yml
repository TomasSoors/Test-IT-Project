name: Build and Push Docker Image to GCR

on:
  push:
    branches:
      - main  # Trigger the workflow when code is pushed to the main branch. Adjust if needed.
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Configure Docker to use Google Cloud credentials
        run: |
          gcloud auth configure-docker

      - name: Build Docker image
        run: |
          # Set variables
          IMAGE_NAME="gcr.io/YOUR_PROJECT_ID/YOUR_IMAGE_NAME"
          TAG="${{ github.sha }}"  # Use Git SHA as the tag or replace with a custom tag

          # Build the Docker image
          docker build -t "$IMAGE_NAME:$TAG" .

      - name: Push Docker image to GCR
        run: |
          docker push "$IMAGE_NAME:$TAG"

      - name: Verify image pushed
        run: |
          gcloud container images list-tags "$IMAGE_NAME"
