name: Build and Push Docker Image to GCR

on:
  push:
    branches:
      - main  # Trigger the workflow when code is pushed to the main branch. Adjust if needed
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Configure Docker to use Google Cloud credentials
        run: |
          gcloud auth configure-docker europe-west1-docker.pkg.dev


      - name: Build Docker image
        run: |
          
          IMAGE_NAME="europe-west1-docker.pkg.dev/buzzwatch-422510/mutualism/mutualism-frontend"  
          TAG="2" 

      
          docker build -t "$IMAGE_NAME:$TAG" frontend

      - name: Push Docker image to GCR
        run: |
          IMAGE_NAME="europe-west1-docker.pkg.dev/buzzwatch-422510/mutualism/mutualism-frontend"  
          TAG="2" 
          docker push "$IMAGE_NAME:$TAG"

